<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AutoMax — Fornecedores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/styles/automax-os.css" rel="stylesheet" />
  <link href="/styles/fornecedores.css" rel="stylesheet" />
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()" aria-hidden="true"></div>
<div class="toast-c" id="toastC" role="status" aria-live="polite"></div>

<aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu principal">
  <div class="sb-logo">
    <div class="sb-logo-icon" aria-hidden="true"><i class="bi bi-wrench-adjustable"></i></div>
    <div>
      <div class="sb-logo-name">AutoMax</div>
      <div class="sb-logo-tag">Soluções Automotivas</div>
    </div>
  </div>

  <div class="sb-profile" aria-label="Usuário logado">
    <div class="av" id="sbAv" aria-hidden="true"></div>
    <div>
      <div class="prof-name" id="sbName"></div>
      <span class="pbadge" id="sbRole"></span>
    </div>
  </div>

  <nav class="sb-nav" aria-label="Seções do sistema">
    <div class="nav-sec">Principal</div>
    <a href="#" class="nav-item" onclick="return false" aria-label="Dashboard">
      <i class="bi bi-speedometer2" aria-hidden="true"></i>Dashboard
    </a>
    <div class="nav-sec">Operações</div>
    <a href="/ordem-servico" class="nav-item" aria-label="Ordens de Serviço">
      <i class="bi bi-clipboard2-check" aria-hidden="true"></i>Ordens de Serviço
    </a>
    <a href="/estoque" class="nav-item rnav r-g r-m" aria-label="Estoque">
      <i class="bi bi-boxes" aria-hidden="true"></i>Estoque
    </a>
    <a href="/fornecedores" class="nav-item active rnav r-g" aria-current="page" aria-label="Fornecedores">
      <i class="bi bi-truck" aria-hidden="true"></i>Fornecedores
    </a>
    <a href="/funcionarios" class="nav-item rnav r-g" aria-label="Funcionários">
      <i class="bi bi-person-badge" aria-hidden="true"></i>Funcionários
    </a>
    <div class="nav-sec">Sistema</div>
    <a href="#" class="nav-item rnav r-g" onclick="return false" aria-label="Logs do sistema">
      <i class="bi bi-journal-code" aria-hidden="true"></i>Logs
    </a>
  </nav>

  <div class="sb-footer">
    <form method="POST" action="/auth/logout" id="formLogout">
      <input type="hidden" name="csrf_token" id="csrfLogout" value="">
      <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center" aria-label="Sair do sistema">
        <i class="bi bi-box-arrow-left" aria-hidden="true"></i>Sair
      </button>
    </form>
  </div>
</aside>

<div class="main-wrap" id="mainWrap">
  <header class="topbar" role="banner">
    <button class="topbar-toggle" id="sidebarToggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar">
      <i class="bi bi-list" aria-hidden="true"></i>
    </button>
    <div class="topbar-title">
      <i class="bi bi-truck" aria-hidden="true"></i>
      Fornecedores
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </header>

  <main class="page-content" id="main" role="main">

    <div class="page-header">
      <div>
        <h1 class="page-title">Fornecedores</h1>
        <p class="page-sub">Gerencie os fornecedores de peças da oficina</p>
      </div>
      <button class="btn btn-primary" id="btnNovo" aria-label="Cadastrar novo fornecedor">
        <i class="bi bi-plus-lg" aria-hidden="true"></i>Novo Fornecedor
      </button>
    </div>

    <div class="card-panel">
      <div class="panel-toolbar">
        <div class="search-box">
          <i class="bi bi-search" aria-hidden="true"></i>
          <input type="search" id="searchInput" placeholder="Buscar por nome ou CNPJ..." aria-label="Buscar fornecedor" autocomplete="off">
        </div>
        <span class="count-label" id="countLabel">carregando...</span>
      </div>

      <div class="table-wrap" role="region" aria-label="Lista de fornecedores" aria-live="polite">
        <table class="data-table" id="tabelaFornecedores">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Nome</th>
              <th scope="col">CNPJ</th>
              <th scope="col" class="col-actions">Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyFornecedores">
            <tr class="row-loading">
              <td colspan="4"><i class="bi bi-arrow-repeat spin" aria-hidden="true"></i> Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop" aria-hidden="true"></div>

<dialog class="app-modal" id="modalFornecedor" aria-labelledby="modalTitle" aria-modal="true">
  <div class="modal-header">
    <h2 class="modal-title" id="modalTitle">Novo Fornecedor</h2>
    <button class="modal-close" id="btnFecharModal" aria-label="Fechar">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
  </div>

  <form id="formFornecedor" novalidate>
    <input type="hidden" id="fornecedorId" value="">

    <div class="field-group">
      <label class="field-label" for="inputNome">Nome do fornecedor <span aria-hidden="true">*</span></label>
      <input class="field-input" type="text" id="inputNome" name="nome_fornecedor"
             placeholder="Ex: Distribuidora Randon" required maxlength="255"
             aria-required="true">
      <span class="field-error" id="erroNome" role="alert"></span>
    </div>

    <div class="field-group">
      <label class="field-label" for="inputCnpj">CNPJ <span aria-hidden="true">*</span></label>
      <input class="field-input" type="text" id="inputCnpj" name="cnpj"
             placeholder="00.000.000/0000-00" required maxlength="18"
             aria-required="true" inputmode="numeric">
      <span class="field-error" id="erroCnpj" role="alert"></span>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" id="btnCancelar">Cancelar</button>
      <button type="submit" class="btn btn-primary" id="btnSalvar">
        <i class="bi bi-check-lg" aria-hidden="true"></i>Salvar
      </button>
    </div>
  </form>
</dialog>

<dialog class="app-modal app-modal--sm" id="modalConfirmar" aria-labelledby="confirmTitle" aria-modal="true">
  <div class="modal-header">
    <h2 class="modal-title" id="confirmTitle">Confirmar exclusão</h2>
  </div>
  <p class="confirm-msg" id="confirmMsg"></p>
  <div class="modal-footer">
    <button type="button" class="btn btn-ghost" id="btnCancelarConfirm">Cancelar</button>
    <button type="button" class="btn btn-danger" id="btnConfirmarDelete">
      <i class="bi bi-trash" aria-hidden="true"></i>Excluir
    </button>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const user = window.__session_user || {};
const csrf = user.csrf_token || '';

function setupSidebar() {
  document.getElementById('sbAv').textContent = user.iniciais || '?';
  document.getElementById('sbAv').className = 'av av-' + (user.nivel || '');
  document.getElementById('sbName').textContent = user.nome || '';
  const roleEl = document.getElementById('sbRole');
  roleEl.textContent = user.nivel || '';
  roleEl.className = 'pbadge pb-' + (user.nivel || '');
  document.getElementById('csrfLogout').value = csrf;

  const toggle = document.getElementById('sidebarToggle');
  toggle.addEventListener('click', () => toggleSidebar());
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const toggle = document.getElementById('sidebarToggle');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('visible', open);
  toggle.setAttribute('aria-expanded', open);
  ov.setAttribute('aria-hidden', !open);
}

function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.remove('open');
  ov.classList.remove('visible');
  document.getElementById('sidebarToggle').setAttribute('aria-expanded', false);
  ov.setAttribute('aria-hidden', true);
}

function filtrarPorPermissao() {
  const perms = user.permissoes || [];
  const eh_gerente = perms.includes('funcionarios.visualizar');
  document.querySelectorAll('.rnav.r-g').forEach(el => {
    if (!eh_gerente) el.style.display = 'none';
  });
}

function toast(msg, tipo = 'ok') {
  const c = document.getElementById('toastC');
  const t = document.createElement('div');
  t.className = 'toast toast-' + tipo;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
}

function formatCnpj(v) {
  const d = v.replace(/\D/g, '').slice(0, 14);
  return d.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5')
          .replace(/^(\d{2})(\d{3})(\d{3})(\d{4})$/, '$1.$2.$3/$4')
          .replace(/^(\d{2})(\d{3})(\d{3})$/, '$1.$2.$3')
          .replace(/^(\d{2})(\d{3})$/, '$1.$2')
          .replace(/^(\d{2})$/, '$1');
}

let fornecedores = [];
let deletarId = null;

async function carregarFornecedores() {
  try {
    const res = await fetch('/api/fornecedores', { credentials: 'same-origin' });
    if (!res.ok) throw new Error('Falha ao carregar');
    fornecedores = await res.json();
    renderTabela(fornecedores);
  } catch {
    document.getElementById('tbodyFornecedores').innerHTML =
      '<tr><td colspan="4" class="row-error"><i class="bi bi-exclamation-triangle"></i> Erro ao carregar fornecedores.</td></tr>';
  }
}

function renderTabela(lista) {
  const tbody = document.getElementById('tbodyFornecedores');
  document.getElementById('countLabel').textContent = lista.length + ' fornecedor(es)';

  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="row-empty"><i class="bi bi-inbox"></i> Nenhum fornecedor encontrado.</td></tr>';
    return;
  }

  tbody.innerHTML = lista.map(f => `
    <tr>
      <td class="col-id">${f.id_fornecedor}</td>
      <td><span class="cell-name">${esc(f.nome_fornecedor)}</span></td>
      <td><code class="cell-code">${esc(f.cnpj)}</code></td>
      <td class="col-actions">
        <button class="btn-icon" onclick="abrirEdicao(${f.id_fornecedor})" aria-label="Editar ${esc(f.nome_fornecedor)}">
          <i class="bi bi-pencil" aria-hidden="true"></i>
        </button>
        <button class="btn-icon btn-icon--danger" onclick="confirmarDelete(${f.id_fornecedor}, '${esc(f.nome_fornecedor)}')" aria-label="Excluir ${esc(f.nome_fornecedor)}">
          <i class="bi bi-trash" aria-hidden="true"></i>
        </button>
      </td>
    </tr>
  `).join('');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buscar(q) {
  const termo = q.toLowerCase();
  renderTabela(fornecedores.filter(f =>
    f.nome_fornecedor.toLowerCase().includes(termo) || f.cnpj.includes(termo)
  ));
}

function abrirModal(titulo = 'Novo Fornecedor') {
  document.getElementById('modalTitle').textContent = titulo;
  document.getElementById('modalBackdrop').classList.add('visible');
  document.getElementById('modalFornecedor').showModal();
  document.getElementById('inputNome').focus();
}

function fecharModal() {
  document.getElementById('modalFornecedor').close();
  document.getElementById('modalBackdrop').classList.remove('visible');
  document.getElementById('formFornecedor').reset();
  document.getElementById('fornecedorId').value = '';
  document.getElementById('erroNome').textContent = '';
  document.getElementById('erroCnpj').textContent = '';
}

function abrirEdicao(id) {
  const f = fornecedores.find(x => x.id_fornecedor === id);
  if (!f) return;
  document.getElementById('fornecedorId').value = f.id_fornecedor;
  document.getElementById('inputNome').value = f.nome_fornecedor;
  document.getElementById('inputCnpj').value = f.cnpj;
  abrirModal('Editar Fornecedor');
}

function confirmarDelete(id, nome) {
  deletarId = id;
  document.getElementById('confirmMsg').textContent = `Excluir "${nome}"? Esta ação não pode ser desfeita.`;
  document.getElementById('modalBackdrop').classList.add('visible');
  document.getElementById('modalConfirmar').showModal();
  document.getElementById('btnCancelarConfirm').focus();
}

function fecharConfirm() {
  document.getElementById('modalConfirmar').close();
  document.getElementById('modalBackdrop').classList.remove('visible');
  deletarId = null;
}

async function salvarFornecedor(e) {
  e.preventDefault();
  const id = document.getElementById('fornecedorId').value;
  const nome = document.getElementById('inputNome').value.trim();
  const cnpj = document.getElementById('inputCnpj').value.replace(/\D/g, '');

  document.getElementById('erroNome').textContent = '';
  document.getElementById('erroCnpj').textContent = '';

  let valido = true;
  if (!nome) { document.getElementById('erroNome').textContent = 'Nome obrigatório.'; valido = false; }
  if (cnpj.length !== 14) { document.getElementById('erroCnpj').textContent = 'CNPJ deve ter 14 dígitos.'; valido = false; }
  if (!valido) return;

  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;

  const url = id ? `/api/fornecedores/${id}` : '/api/fornecedores';
  const method = id ? 'PATCH' : 'POST';

  try {
    const res = await fetch(url, {
      method,
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
      body: JSON.stringify({ nome_fornecedor: nome, cnpj })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Erro desconhecido');
    toast(id ? 'Fornecedor atualizado.' : 'Fornecedor cadastrado.', 'ok');
    fecharModal();
    carregarFornecedores();
  } catch (err) {
    toast(err.message, 'erro');
  } finally {
    btn.disabled = false;
  }
}

async function executarDelete() {
  if (!deletarId) return;
  const btn = document.getElementById('btnConfirmarDelete');
  btn.disabled = true;
  try {
    const res = await fetch(`/api/fornecedores/${deletarId}`, {
      method: 'DELETE',
      credentials: 'same-origin',
      headers: { 'X-CSRF-Token': csrf }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Erro ao excluir');
    toast('Fornecedor excluído.', 'ok');
    fecharConfirm();
    carregarFornecedores();
  } catch (err) {
    toast(err.message, 'erro');
    btn.disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  setupSidebar();
  filtrarPorPermissao();
  carregarFornecedores();

  document.getElementById('btnNovo').addEventListener('click', abrirModal);
  document.getElementById('btnFecharModal').addEventListener('click', fecharModal);
  document.getElementById('btnCancelar').addEventListener('click', fecharModal);
  document.getElementById('formFornecedor').addEventListener('submit', salvarFornecedor);
  document.getElementById('btnConfirmarDelete').addEventListener('click', executarDelete);
  document.getElementById('btnCancelarConfirm').addEventListener('click', fecharConfirm);

  document.getElementById('inputCnpj').addEventListener('input', e => {
    e.target.value = formatCnpj(e.target.value);
  });

  document.getElementById('searchInput').addEventListener('input', e => buscar(e.target.value));

  document.getElementById('modalFornecedor').addEventListener('cancel', fecharModal);
  document.getElementById('modalConfirmar').addEventListener('cancel', fecharConfirm);
});
</script>
</body>
</html>
